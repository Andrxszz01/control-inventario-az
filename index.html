<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control de Inventario AZ</title>
  <style>
    :root {
      --bg: #f7f4ef;
      --ink: #1f2937;
      --brand: #12496f;
      --accent: #ff7a1a;
      --line: #dbe2ea;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Trebuchet MS", Verdana, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 95% 0%, #ffd9b6 0%, rgba(255, 217, 182, 0) 35%),
        radial-gradient(circle at 0% 18%, #d9ecff 0%, rgba(217, 236, 255, 0) 35%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(760px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 14px 30px rgba(10, 28, 48, 0.08);
    }
    h1 { margin: 0 0 10px; color: var(--brand); }
    p { margin: 0 0 18px; line-height: 1.6; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    a {
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--ink);
      background: #fff9f5;
      font-weight: 600;
    }
    a:hover { border-color: var(--accent); }
    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="card">
    <h1>Control de Inventario AZ</h1>
    <p>Selecciona la página que deseas abrir.</p>
    <div class="grid">
      <a href="Control%20de%20Inventario%20AZ.html">Pagina Comercial</a>
      <a href="MANUAL.html">Manual de Usuario</a>
      <a href="REQUISITOS.html">Requisitos del Sistema</a>
      <a href="GUIA_GENERIC_TEXT.html">Guia de Impresora</a>
    </div>
  </main>
</body>
</html>
