<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciando...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: white;
      overflow: hidden;
      user-select: none;
    }
    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .glow-1 { width: 400px; height: 400px; background: rgba(59,130,246,0.08); top: -100px; right: -100px; }
    .glow-2 { width: 300px; height: 300px; background: rgba(99,102,241,0.08); bottom: -80px; left: -80px; }
    .content { position: relative; z-index: 1; text-align: center; }
    .logo-wrap {
      width: 96px; height: 96px;
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.25);
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      box-shadow: 0 0 40px rgba(59,130,246,0.15);
    }
    h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 6px; }
    .subtitle { font-size: 12px; color: rgba(148,163,184,0.7); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 48px; }
    .spinner {
      width: 36px; height: 36px;
      border: 2.5px solid rgba(59,130,246,0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 16px;
    }
    .status { font-size: 13px; color: rgba(148,163,184,0.55); animation: pulse 2s ease-in-out infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  </style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
  <div class="content">
    <div class="logo-wrap">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
        <line x1="12" y1="22.08" x2="12" y2="12"/>
      </svg>
    </div>
    <h1>Control de Inventario AZ</h1>
    <p class="subtitle">Sistema de Gestión Profesional</p>
    <div class="spinner"></div>
    <p class="status">Iniciando servidor...</p>
  </div>
</body>
</html>
